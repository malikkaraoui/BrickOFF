# =====================================================================
# CH-S / S.2 — Générateur de scènes synthétiques v0 — config v1
# =====================================================================
# TOUS les paramètres de randomisation sont ici (plan 16 §S.2, normatif).
# Toute plage tirée par le générateur DOIT venir de ce fichier (aucune
# valeur magique dans le code). Versionné ; toute évolution = nouvelle
# version du fichier + note au CHANGELOG_CHS.md.
#
# Unités : 1 unité scène = 100 LDU = 40 mm (préflight, point 3).

dataset_id: synth_v2
master_seed: 20260705

paths:
  ldraw: data/raw/ldraw/ldraw
  gdansk_cls_photos: data/raw/gdansk_cls/photos
  synth_assets_manifest: data/manifests/synth_assets.json
  assets_root: data/raw/synth_assets
  part_freq_cache: ml/synth/part_freqs_gdansk.json

render:
  resolution: 640            # rendu ET masques (préflight point 5 : pas de passe x2)
  eevee_samples: 32
  mask_threshold: 0.5        # seuil binaire bbox sur le coverage cryptomatte
  keep_exr: false            # EXR multilayer supprimé après extraction (0,3-0,5 Mo/scène)

batch:
  size: 400                  # relance du process Blender entre batchs (fuites mémoire)
  max_attempts: 3            # relances d'un batch sur scènes manquantes/crash

# --- assertion d'échelle au démarrage de CHAQUE batch (bloquant) -----
scale_assert:
  part_id: "3001"
  expected_mm: [31.92, 15.92, 11.12]   # mesuré au préflight (gap addon actif)
  tol_mm: 0.5

# --- simulation physique (décisions préflight : HULL défauts Bullet) --
sim:
  frame_end: 150
  substeps: 20               # défauts Bullet — NE PAS toucher (préflight point 2)
  iterations: 20
  mass: 0.01
  friction: 0.7
  restitution: 0.05
  drop_extent_base: 0.34     # demi-étendue XY du lâcher pour 20 pièces (unités), échelle sqrt(N/20)
  drop_extent_min: 0.12
  drop_z0: 0.25              # hauteur (bas de pièce) du 1er lâcher (unités)
  drop_gap: 0.12             # jeu entre sphères englobantes au spawn (>= 2x marge hull 0,04)
  wall_margin: 0.9           # parois invisibles pendant le bake, à drop_extent + margin
  wall_height: 14.0
  reject_radius: 3.2         # pièce finissant à > r du centre ou sous le sol -> supprimée + tracée

# --- composition des scènes ------------------------------------------
scene:
  p_background_only: 0.03    # fond seul (négatif pur)
  # v2 : régimes DÉCALÉS VERS LE DENSE (le vrai cas produit : tas versés) + un régime très dense
  n_pieces_regimes:
    - {p: 0.10, min: 1,  max: 5}    # études / petits tas
    - {p: 0.25, min: 6,  max: 20}   # moyens
    - {p: 0.40, min: 21, max: 45}   # denses (le cœur)
    - {p: 0.25, min: 46, max: 75}   # TRÈS denses / enfouissement (nouveau)
  # v2 : fraction de scènes MONOCHROMES (pièces de même couleur, frontières dures)
  p_monochrome: 0.30

parts:
  p_empirical: 0.70          # 70 % fréquences empiriques gdansk_cls / 30 % uniforme
  exclude: ["20896", "98560"]  # absents de LDraw officiel (préflight point 1)

# --- couleurs : palette LDraw (LDConfig.ldr, couleurs de l'addon) -----
colors:
  # S.3 : transparents TESTÉS en EEVEE et EXCLUS v1 (décision plan, flag) :
  # brique isolée en gros plan = OK, mais en tas à 640² les pièces trans-*
  # rendent opaques/ternes et les teintes claires sont viciées (transmission
  # raytracée EEVEE insuffisante à cette échelle) — détail CHANGELOG_CHS.md S.3.
  # p_transparent > 0 = fraction de pièces tirées dans les couleurs trans-*
  # (ALPHA de LDConfig, glitter/opal exclus).
  p_transparent: 0.0
  trans_roughness: [0.01, 0.10]   # roughness des pièces transparentes (si activées)
  trans_ior: 1.55
  p_uniform_solid: 0.25      # tirage uniforme parmi TOUTES les couleurs solides LDConfig
  # sinon : tirage pondéré parmi les couleurs LEGO courantes (code LDraw: poids)
  weighted_codes:
    0: 10.0     # Black
    15: 8.0     # White
    71: 8.0     # Light_Bluish_Grey
    72: 6.0     # Dark_Bluish_Grey
    4: 7.0      # Red
    1: 7.0      # Blue
    14: 6.0     # Yellow
    19: 4.5     # Tan
    2: 4.0      # Green
    25: 3.0     # Orange
    70: 3.0     # Reddish_Brown
    28: 2.0     # Dark_Tan
    10: 2.0     # Bright_Green
    27: 1.5     # Lime
    191: 1.5    # Bright_Light_Orange
    320: 1.5    # Dark_Red
    272: 1.2    # Dark_Blue
    288: 1.2    # Dark_Green
    73: 1.0     # Medium_Blue
    322: 1.0    # Medium_Azure
    321: 1.0    # Dark_Azure
    26: 0.8     # Magenta
    5: 0.8      # Dark_Pink
    13: 0.8     # Pink
    31: 0.8     # Lavender
    30: 0.8     # Medium_Lavender
    226: 0.8    # Bright_Light_Yellow
    323: 0.6    # Light_Aqua
    378: 0.6    # Sand_Green
    379: 0.6    # Sand_Blue
    330: 0.6    # Olive_Green
    484: 0.6    # Dark_Orange
    308: 0.6    # Dark_Brown
    84: 0.6     # Medium_Nougat
    92: 0.5     # Nougat
    78: 0.5     # Light_Nougat
    353: 0.5    # Coral
    3: 0.5      # Dark_Turquoise

# --- shader pièces : UN node-tree partagé, paramétré PAR OBJET --------
# (obj.color = couleur LDraw linéaire ; custom props bo_* lus par des
#  nœuds Attribute type OBJECT — hooks du durcissement S.3)
piece_material:
  # S.3 : plage totale de roughness par pièce = [0.05 ; 0.35] (design inputs §2.2),
  # variation spatiale par noise partagée (rough_noise_scale) + offset UV par pièce.
  rough_min: [0.05, 0.25]    # borne basse de la roughness bruitée, tirée par pièce
  rough_span: [0.04, 0.10]   # rough_max = rough_min + span (max 0.35)
  rough_noise_scale: 30.0
  sss_weight: [0.05, 0.15]   # subsurface léger (ABS)
  bump_strength: [0.005, 0.03]
  bump_noise_scale: 350.0
  # S.3 : micro-imperfections procédurales SUBTILES (pas de textures externes)
  scratch_strength: [0.0, 0.12]  # rayures (voronoï anisotrope) ajoutées à la roughness
  scratch_scale: 55.0            # densité des rayures (coordonnées objet étirées)
  scratch_aniso: 8.0             # étirement directionnel (rayures, pas des points)
  scratch_threshold: 0.08        # largeur des rayures (distance voronoï < seuil)
  dust_strength: [0.0, 0.10]     # poussière (noise pondéré 'up') ajoutée à la roughness
  dust_scale: 6.0
  # S.3 : jitter HSV par pièce (les vraies pièces déteignent/jaunissent)
  hsv_jitter:
    h: 0.03                  # ±3 % de teinte (fraction du cercle)
    s: 0.08                  # ±8 % multiplicatif
    v: 0.08                  # ±8 % multiplicatif
  # S.3 : micro-bevel — le node Bevel est Cycles-only (no-op EEVEE) ; un modifier
  # Bevel par pièce est le seul chemin EEVEE -> coût mesuré, voir CHANGELOG.
  bevel_width: 0.0           # unités scène (0 = désactivé)

# --- sol --------------------------------------------------------------
floor:
  size_units: 60             # 2,4 m — couvre le fond même à 30° d'élévation
  p_plain: 0.20              # fond uni type table blanche (28 % du corpus réel; part S.2 : 20 %)
  plain_value: [0.55, 0.97]
  plain_saturation: [0.0, 0.08]
  plain_roughness: [0.25, 0.7]
  texture_scale_units: [6.0, 26.0]   # taille du motif projeté (unités scène) — 24 cm à 1 m
  texture_rotation_deg: [0.0, 360.0]

# --- éclairage ---------------------------------------------------------
hdri:
  class_weights: {warm: 0.50, neutral: 0.25, cold: 0.25}  # ~50 % chauds (plan S.1/S.2)
  rotation_deg: [0.0, 360.0]
  strength: [0.5, 1.4]
key_light:                   # lampe additionnelle optionnelle (ombres marquées, biais chaud)
  p: 0.6
  p_area: 0.7                # sinon SUN
  sun_energy: [2.0, 6.0]
  area_power: [200.0, 1200.0]
  area_size: [1.5, 5.0]
  distance: [6.0, 14.0]
  elevation_deg: [30.0, 75.0]
  temp_k: [2700.0, 6500.0]

# --- caméra ------------------------------------------------------------
camera:
  sensor_mm: 36.0
  focal_mm_eq: [24.0, 56.0]  # v2 : couvre x1 (24-28) ET x2 (~48-56, telephoto batch 2)
  elevation_regimes:         # plongée : 60 % [60-90°] / 40 % [30-60°]
    - {p: 0.60, min: 60.0, max: 90.0}
    - {p: 0.40, min: 30.0, max: 60.0}
  fill_fraction: [0.30, 0.80]  # étendue du tas / largeur image
  tilt_deg: 10.0             # roll ±10°
  aim_offset_frac: 0.35   # élargi (spot-the-fake tell n°4 : tas trop centrés)      # décentrage de la visée, fraction du rayon du tas
  bg_virtual_radius: [0.8, 3.0]  # "rayon de tas" fictif pour cadrer les scènes fond seul

# --- distracteurs non-LEGO (jamais annotés) ----------------------------
distractors:
  p_scene: 0.30              # 30 % des scènes en contiennent
  count: [1, 3]
  p_model: 0.60              # modèle .blend Poly Haven ; sinon primitive procédurale (plan B S.1)
  model_scale: 25.0          # modèles en mètres -> unités scène (1 m = 25 u)
  procedural: [coin, die, cable, cork]
  min_gap_units: 0.35        # écart minimal aux pièces du tas
  max_place_tries: 12
  img_margin: 0.12           # placement visé dans [margin, 1-margin] de l'image

# --- post-process capteur (S.3) — ml/synth/postprocess.py ---------------
# Appliqué APRÈS extraction des labels, sur les PNG rendus (jamais sur les
# labels) ; paramètres tirés PAR IMAGE (seed scène + 1000003) et tracés dans
# le manifest (clé "postprocess"). Sortie : .jpg (le .png est supprimé).
postprocess:
  enabled: true
  # bruit ISO : gaussien (lecture) + poisson léger (photons), en linéaire
  noise_read_sigma: [0.002, 0.010]   # écart-type gaussien (échelle 0-1)
  noise_photon_fullwell: [500, 3000] # photons à pleine échelle (poisson ~ sqrt(I/N))
  # flou de bougé directionnel (moyenne d'images décalées sub-pixel)
  motion_blur_p: 0.5
  motion_blur_px: [0.4, 1.5]         # longueur totale du segment (<= 1.5 px, plan)
  # DoF simulé simple : flou progressif hors zone centrale (approximation)
  dof_p: 0.7
  dof_sharp_radius: [0.30, 0.60]     # rayon net (fraction de la demi-diagonale)
  dof_max_sigma: [0.6, 2.2]          # sigma gaussien au coin (px)
  dof_center_jitter: 0.12            # jitter du centre de netteté (fraction image)
  # dérive balance des blancs (AWB smartphone qui se trompe)
  wb_delta_k: [-800.0, 800.0]
  # signature ISP téléphone (correctif spot-the-fake, tell n°3) : les pipelines
  # photo resaturent et contrastent APRÈS l'AWB — sans ça, voile pastel désaturé
  sat_boost: [1.08, 1.30]            # vibrance post-AWB
  contrast_s: [0.06, 0.20]           # force de la courbe en S
  wb_base_k: 6500.0
  # vignettage léger
  vignette_p: 0.8
  vignette_strength: [0.04, 0.22]    # assombrissement au coin (facteur * r^2)
  # compression finale
  jpeg_quality: [70, 95]

# --- labels (convention data/manifests/annotation_convention.md) -------
labels:
  coverage_positive: 0.25    # >= 25 % visible -> positif
  coverage_hard: 0.10        # 10-25 % -> ligne '# hard' (conservée, ignorée à l'entraînement)
  min_visible_px: 16         # garde-fou : masque < 16 px -> pas de label (sub-détectable)
  solo_max_samples: 2500     # rayons max pour estimer l'aire non-occluse (dénominateur coverage)

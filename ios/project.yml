# Projet généré par XcodeGen — le .xcodeproj n'est PAS versionné.
# Régénération : `cd ios && xcodegen generate`
name: BrickOFF
options:
  bundleIdPrefix: com.brickoff
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.11.1

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  BrickOFF:
    type: application
    platform: iOS
    sources:
      - path: BrickOFF
        excludes:
          - "Tests/**"
          - "**/.gitkeep"
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brickoff.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "BrickOFF utilise la caméra pour reconnaître vos pièces LEGO et remplir votre inventaire."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1

  BrickOFFTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BrickOFF/Tests/UnitTests
    dependencies:
      - target: BrickOFF
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BrickOFF:
    build:
      targets:
        BrickOFF: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrickOFFTests

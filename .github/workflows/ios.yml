# CI iOS minimale (CH-4 jalon 4.4) : build + tests unitaires sur simulateur.
#
# Runner : macos-26 (GA depuis 2026-02, Xcode 26.4.1 par défaut → simulateurs
# iPhone 17 disponibles ; `macos-latest` pointe désormais aussi sur macos-26).
# Le script build_test.sh a de toute façon un fallback si le simulateur
# préféré n'existe pas sur l'image.
name: iOS

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"

jobs:
  build-test:
    name: Build & tests (simulateur iOS)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build & test
        run: ios/scripts/build_test.sh
